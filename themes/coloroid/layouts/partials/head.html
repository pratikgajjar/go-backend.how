<!-- Performance hints -->
<link rel="preload" href="/fonts/departuremono/DepartureMono-Regular.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/fonts/jetbrains/JetBrainsMono[wght].woff2" as="font" type="font/woff2" crossorigin>
{{- if eq .Kind "page" }}
<link rel="preload" href="/fonts/jetbrains/JetBrainsMono-Italic[wght].woff2" as="font" type="font/woff2" crossorigin>
{{- end }}
<link rel="dns-prefetch" href="//stats.backend.how">
<link rel="preconnect" href="https://stats.backend.how">
{{- if .Params.math }}
<link rel="dns-prefetch" href="//cdn.jsdelivr.net">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
{{- end }}
<!-- Cross-document View Transitions: smooth fade between pages on supporting browsers -->
<meta name="view-transition" content="same-origin">
<!-- Theme and display settings (charset and viewport are in baseof.html) -->
<meta name="theme-color" content="#100f0f" />
<meta name="author" content="{{ .Site.Params.author.name }}" />
<meta name="copyright" content="{{ .Site.Copyright }}" />
<meta name="language" content="{{ .Site.LanguageCode }}" />
<meta name="generator" content="Hugo {{ hugo.Version }}" />
<!-- Mobile App Settings -->
<meta name="application-name" content="{{ .Site.Title }}" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-status-bar-style" content="black-translucent" />
<!-- Favicon -->
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
<link rel="manifest" href="/site.webmanifest" />
<link rel="shortcut icon" href="/favicon.ico" />
<!-- SEO Components -->
{{ partial "head/seo.html" . }}
<!-- CSS & JS -->
{{ partialCached "head/css.html" . .Kind .Layout }} {{ partialCached "head/js.html" . }}
{{- /* RSS alternate link is already emitted by head/seo.html via .AlternativeOutputFormats. */ -}}

<script
    defer
    data-domain="backend.how"
    src="https://stats.backend.how/js/script.js"
></script>
